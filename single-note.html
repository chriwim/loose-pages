<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Note</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #note {
      flex: 1;
      width: 100%;
      padding: 1.5rem;
      background: transparent;
      color: inherit;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      border: none;
      outline: none;
      resize: none;
      caret-color: #569cd6;
    }

    #copy-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.9rem;
      background: #2d2d2d;
      color: #d4d4d4;
      border: 1px solid #444;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      user-select: none;
    }

    #copy-btn:hover {
      background: #3a3a3a;
      border-color: #666;
    }

    #copy-btn.copied {
      color: #4ec994;
      border-color: #4ec994;
    }

    #copy-btn svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <textarea id="note" placeholder="Start typing…" spellcheck="true" autocomplete="off"></textarea>

  <button id="copy-btn" title="Copy to clipboard">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M4 2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2zm2-1a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H6z"/>
      <path d="M2 5a1 1 0 0 0-1 1v8a2 2 0 0 0 2 2h7a1 1 0 0 0 0-2H3V6a1 1 0 0 0-1-1z"/>
    </svg>
    Copy
  </button>

  <script>
    const STORAGE_KEY = 'single-note-content';
    const note = document.getElementById('note');
    const copyBtn = document.getElementById('copy-btn');

    // Restore saved content
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved !== null) note.value = saved;

    // Persist on every change
    note.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, note.value);
    });

    // Copy to clipboard
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(note.value);
        copyBtn.classList.add('copied');
        copyBtn.querySelector('svg').innerHTML = '<path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0z"/>';
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.querySelector('svg').innerHTML = '<path d="M4 2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2zm2-1a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H6z"/><path d="M2 5a1 1 0 0 0-1 1v8a2 2 0 0 0 2 2h7a1 1 0 0 0 0-2H3V6a1 1 0 0 0-1-1z"/>';
        }, 2000);
      } catch {
        // Fallback for older browsers
        note.select();
        document.execCommand('copy');
      }
    });
  </script>
</body>
</html>
